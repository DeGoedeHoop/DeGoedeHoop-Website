kind = "web"
previewPath = "/"
title = "De Goede Hoop Koshuis"
version = "1.0.0"
id = "artifacts/de-goede-hoop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25315

[services.development]
run = "pnpm --filter @workspace/de-goede-hoop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/de-goede-hoop", "run", "build" ]
publicDir = "artifacts/de-goede-hoop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25315"
BASE_PATH = "/"
